name: Sync routine outputs to main

# The cloud routine can't push straight to `main` (its harness branches first),
# so it lands seen_papers.json and the published docs/ on a `claude/**` branch.
# This action copies both onto `main` so the dedup state stays current AND
# GitHub Pages (served from main /docs) serves the newest issue + RSS feed.
# candidates.json/digest.json are never synced (they're gitignored anyway).

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'seen_papers.json'
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: sync-outputs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Copy seen_papers.json + docs/ from the pushed branch onto main
        run: |
          git checkout "${{ github.sha }}" -- seen_papers.json 2>/dev/null || true
          git checkout "${{ github.sha }}" -- docs 2>/dev/null || true
          git add -A seen_papers.json docs 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to sync onto main."
            exit 0
          fi
          git config user.name "forward-pass-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore: sync seen papers + published issue from ${{ github.ref_name }}"
          git push origin main
