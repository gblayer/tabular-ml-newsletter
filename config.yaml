# ------------------------------------------------------------
# SOURCES
# ------------------------------------------------------------
arxiv:
  enabled: true
  categories: [cs.LG, stat.ML, cs.AI, cs.CL, cs.DB, cs.IR]
  max_results_per_category: 400   # per run; recent window only

huggingface_daily:
  enabled: true                    # all HF daily papers become candidates

openreview:
  enabled: false                   # OFF — conference/OpenReview notes excluded;
                                   # decisions are bursty and low-yield for a
                                   # daily arXiv/HF-driven newsletter.
  search_terms: [tabular, "foundation model", "in-context learning", relational]

semantic_scholar:
  enabled: false                   # optional; set true + provide S2_API_KEY secret
                                   # adds citation-graph-based discovery around
                                   # your seed papers and watchlist authors

# ------------------------------------------------------------
# INDUSTRY WATCH (routine mode only)
# The Claude Code routine session web-searches for FRESH news
# (within lookback_days) about these organizations' tabular-FM work:
# model releases, papers, funding, product launches, benchmarks.
# Only genuinely relevant + recent items are included; if nothing
# newsworthy happened, the industry section is omitted entirely.
# ------------------------------------------------------------
industry_watch:
  enabled: true
  lookback_days: 1                 # daily digest: industry news from the last 24h
  monday_lookback_days: 3          # Mondays: cover Fri-Sun (weekend catch-up)
  companies:
    - Prior Labs          # TabPFN
    - Fundamental         # neural-process tabular FMs
    - Kumo.ai             # KumoRFM / relational FMs
    - NVIDIA
    - Microsoft Research
    - Google / DeepMind
    - Amazon / AWS        # AutoGluon, Mitra
    - Mitra
    - Orion
    - SAP                 # tabular ICL group
    - Salesforce
    - "SODA / Inria"      # TabICL
  # Only surface items that materially concern tabular foundation models,
  # tabular ML, relational FMs, or neural-process modelling.

# ------------------------------------------------------------
# SPOTLIGHT (routine mode only)
# A short themed section on the current status of tabular foundation
# models in ONE specific vertical, rotating / auto-selected each issue
# from the week's papers + news. Kept concise (a few sentences).
# ------------------------------------------------------------
spotlight:
  enabled: true
  themes:
    - "time-series & forecasting"
    - "finance / trading"
    - "healthcare & clinical"
    - "relational / enterprise databases"
    - "efficiency & deployment"
    - "evaluation & benchmarks"
  # The session picks the theme best supported by this issue's material.

# ------------------------------------------------------------
# CLAUDE (relevance filter + summaries)
# ------------------------------------------------------------
claude:
  filter_model: claude-haiku-4-5-20251001   # cheap yes/no relevance batching
  summary_model: claude-sonnet-4-6          # writes the 3-bullet digests
  filter_batch_size: 20
  max_papers_in_newsletter: 10              # cap; ranked by relevance score

# ------------------------------------------------------------
# EMAIL (SMTP; works with Gmail app password)
# Secrets are read from env vars, never stored here:
#   SMTP_USER, SMTP_PASSWORD, NEWSLETTER_TO
# ------------------------------------------------------------
# ------------------------------------------------------------
# WEB PUBLISHING (free at any scale)
# Each real send also writes docs/ (issue page + archive + RSS feed),
# served by GitHub Pages. Readers subscribe via the RSS feed — no
# subscriber list, no unsubscribe logic, no per-recipient cost.
# base_url must match where the site is served (repo must be public for
# free GitHub Pages, or point at another free static host).
# ------------------------------------------------------------
site:
  enabled: true
  base_url: "https://gblayer.github.io/forward-pass-newsletter"

email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  # Newsletter name — shows up in the subject line and the email header.
  # "Forward Pass" nods to a neural-net forward pass (TFMs predict in one).
  # The email subtitle is generated automatically ("Your daily digest of
  # the top N papers in tabular AI").
  subject_prefix: "⏩ Forward Pass"
  newsletter_name: "Forward Pass"

# ------------------------------------------------------------
# SCHEDULING BEHAVIOR
# ------------------------------------------------------------
run:
  lookback_hours: 26        # daily window (26h = safety overlap; dedup handles it)
  monday_lookback_hours: 74 # Mondays reach back to Friday to sweep the weekend
  first_run_lookback_days: 7
  send_weekdays: [0, 1, 2, 3, 4]   # email Mon-Fri (0=Mon .. 6=Sun); skip Sat/Sun
