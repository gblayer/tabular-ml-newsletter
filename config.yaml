# ============================================================
# Tabular ML Newsletter — configuration
# Edit this file to tune what you receive. No code changes needed.
# ============================================================

# ------------------------------------------------------------
# TOPIC PROFILE
# This is the single most important field. It is injected verbatim
# into the Claude relevance-judgment prompt. Papers are kept or
# dropped based on whether they connect to THIS description —
# not just on keywords or authors. Keep it rich and broad.
# ------------------------------------------------------------
topic_profile: |
  I am a PhD student working on tabular machine learning, with a focus on
  tabular foundation models (TFMs) and the intersection of language models
  and structured data. A paper is relevant if it connects to ANY of the
  following themes, even loosely:

  CORE:
  - Tabular foundation models and tabular in-context learning
    (TabPFN, TabICL, TabSTAR, ConTextTab, TabDPT, LimiX, Orion, iLTM, ...)
  - In-context learning IN and FOR tabular foundation models: the mechanisms,
    theory, and empirical behaviour of how TFMs (TabPFN, TabICL, prior-fitted
    networks) learn in-context. CORE when clearly tied to tabular / TFM ICL;
    generic ICL theory on synthetic token sequences with no tabular connection
    is at most weakly adjacent, not core.
  - Work that BUILDS ON TabPFN / TabICL / TabPFN-v2 and their variants:
    extending, fine-tuning, adapting, distilling, scaling, retrieving for,
    probing or benchmarking them — INCLUDING papers that use them as
    backbones, classification heads, feature extractors or primary baselines.
  - Neural processes and amortized-inference / meta-learning model families
    (conditional, attentive and transformer neural processes) as a backbone
    for in-context or probabilistic tabular prediction — this is the modelling
    lineage behind several tabular foundation models (e.g. Fundamental's
    NEXUS). RELEVANT only when the NP / meta-learning *method* is the
    contribution or is tied to tabular / regression / ICL prediction; a pure
    NP application to images, weather or spatial fields is NOT relevant.
  - Embedding extraction and representation learning for STRING / TEXT
    features in tables: encoding column names, cell text, categorical
    values, IDs and free-text fields into semantic vectors; language-aware
    handling of the string-heavy columns that dominate real enterprise data.
  - Deep learning architectures for tabular data (transformers for tables,
    row/column attention, encoder-decoder designs, retrieval-based tabular models)
  - Relational / multi-table foundation models and relational deep learning
    (KumoRFM, relational graph transformers, temporal heterogeneous graphs),
    and knowledge-graph / GNN methods — RELEVANT ONLY when the contribution
    is PREDICTION on relational/tabular data (classification, regression,
    time-series, supervised or unsupervised/representation tasks). Framings
    that are NOT about the predictive modelling itself — adversarial
    attacks/robustness, integrity constraints, database-systems internals,
    query optimization, pure graph theory — are NOT relevant.
  - Semantic and language-aware tabular learning: LLM embeddings for
    tabular features, context-aware semantic embeddings, exploiting column
    names / cell text / metadata, tables with free-text fields
  - Table serialization and string representations of tables for LLMs;
    LLMs prompted or fine-tuned on tabular prediction tasks

  ADAPTATION & EFFICIENCY:
  - Fine-tuning, adapters, PEFT/LoRA, prompt-tuning or knowledge-informed
    adaptation of tabular foundation models
  - Distillation, compression, quantization, pruning of TFMs or of LLMs
    used for structured data
  - Computational/inference cost of TFMs and LLMs: efficient attention,
    scaling context, throughput, memory footprint, deployment constraints

  DATA, EVALUATION & CRITIQUE:
  - Benchmarks and evaluation methodology for tabular ML; contamination,
    illusion of generalization, enterprise vs public data distribution gaps
  - Feature engineering, preprocessing and data-centric approaches for
    tabular benchmarks; AutoML for tabular data
  - Synthetic data generation / priors for pretraining tabular models
  - Transfer learning and cross-table generalization
  - Tabular ensembles and hyperparameter ensembles (e.g. TabPack-style)
  - GBDT vs deep learning comparisons on tabular data

  ADJACENT (still relevant):
  - Table retrieval, table understanding, table QA, text-to-SQL when
    focused on representation learning or retrieval over tables
  - In-context learning theory/mechanisms when clearly transferable to
    tabular ICL; test-time training/adaptation for structured data
  - Graph neural networks applied to relational databases
  - Time-series foundation models ONLY when framed as structured-data /
    tabular-adjacent foundation modeling

  APPLIED PAPERS — the important distinction:
  - RELEVANT: applied or empirical papers that yield insight ABOUT tabular
    ML or TFMs themselves — e.g. enterprise-vs-public data distribution gaps,
    how model rankings shift on real vs benchmark data, when TFMs beat GBDTs,
    few-label / deployment / efficiency trade-offs, data-centric findings.
    (Example of clearly relevant: "Exploring Differences Between Tabular
    Enterprise Data and Public Benchmarks", Kim et al., SAP.)
  - NOT relevant: papers that merely USE a tabular model (XGBoost, a TFM) as
    a tool to obtain a domain result (e.g. "predicting hospital readmission
    with XGBoost", "lung-CT phenotyping with TabPFN as one of seven heads")
    without a methodological or empirical contribution to tabular ML itself.

  NOT relevant (reject):
  - Pure NLP/vision/audio papers with no structured-data angle
  - Generic LLM papers (alignment, RLHF, agents, safety) without a
    tables/structured-data connection
  - Pure applications of neural processes / meta-learning outside tabular
    (image completion, weather downscaling, spatial fields)
  - Relational-DL / graph / KG papers whose contribution is NOT tabular
    prediction — e.g. adversarial attacks/robustness, integrity constraints,
    database internals, query optimization (e.g. "Structural Adversarial
    Attacks on Relational Deep Learning" is NOT relevant)

# ------------------------------------------------------------
# CANDIDATE GENERATION (stage 1, cheap & broad)
# A paper becomes a candidate if it matches ANY prefilter keyword
# (case-insensitive, matched in title+abstract), OR is authored by
# a watchlist author, OR appears in HuggingFace Daily Papers.
# Keep this broad — Claude does the precise filtering in stage 2.
# ------------------------------------------------------------
prefilter_keywords:
  - tabular
  - "table representation"
  - "table understanding"
  - "table retrieval"
  - "tables"
  - "structured data"
  - "relational data"
  - "relational database"
  - "relational deep learning"
  - "foundation model"
  - "in-context learning"
  - "neural process"
  - "neural processes"
  - "conditional neural process"
  - "attentive neural process"
  - "amortized inference"
  - "meta-learning"
  - tabpfn
  - tabicl
  - "gradient boosting"
  - gbdt
  - xgboost
  - "feature engineering"
  - "text-to-sql"
  - "column embedding"
  - "semantic embedding"
  - "string features"
  - "text features"
  - "representation learning"
  - "prior-fitted"
  - "prior-data fitted"
  - serialization
  - distillation
  - "parameter-efficient"
  - lora
  - adapter

